<html><body>
<div class="pajak-field">
    
    <div class="pajak-dropzone" data-pajak-dropzone data-name="documents" data-multiple>
        <div class="pajak-dropzone__zone" role="button" tabindex="0" aria-label="Upload files">
            <span class="pajak-dropzone__icon" aria-hidden="true">
                <svg width="28" height="28" xmlns="http://www.w3.org/2000/svg" fill="none" viewbox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true" data-slot="icon">
  <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"></path>
</svg>            </span>
            <span class="pajak-dropzone__title">Drop files here or click to upload</span>
            <span class="pajak-dropzone__sub">Supports any file type</span>
        </div>

        <input class="pajak-dropzone__input" type="file" id="documents" name="documents[]" multiple tabindex="-1" aria-hidden="true">

        <div class="pajak-dropzone__list" data-pajak-dropzone-list>
                            <div class="pajak-dropzone__item pajak-dropzone__item--existing" data-existing data-file-id="1" data-image>
                    <span class="pajak-dropzone__item-icon" aria-hidden="true">
                                                    <img class="pajak-dropzone__item-thumb" src="/uploads/invoice.pdf" alt="">
                                            </span>
                    <span class="pajak-dropzone__item-info">
                        <span class="pajak-dropzone__item-name">invoice.pdf</span>
                                                    <span class="pajak-dropzone__item-size">200.0 KB</span>
                                            </span>
                    <input type="hidden" name="documents_existing[]" value="1" data-existing-input>
                                            <button type="button" class="pajak-dropzone__item-remove" aria-label="Remove file">
                            <svg width="14" height="14" xmlns="http://www.w3.org/2000/svg" viewbox="0 0 20 20" fill="currentColor" aria-hidden="true" data-slot="icon">
  <path d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z"></path>
</svg>                        </button>
                                    </div>
                            <div class="pajak-dropzone__item pajak-dropzone__item--existing" data-existing data-file-id="2" data-image>
                    <span class="pajak-dropzone__item-icon" aria-hidden="true">
                                                    <img class="pajak-dropzone__item-thumb" src="/uploads/contract.docx" alt="">
                                            </span>
                    <span class="pajak-dropzone__item-info">
                        <span class="pajak-dropzone__item-name">contract.docx</span>
                                                    <span class="pajak-dropzone__item-size">50.0 KB</span>
                                            </span>
                    <input type="hidden" name="documents_existing[]" value="2" data-existing-input>
                                            <button type="button" class="pajak-dropzone__item-remove" aria-label="Remove file">
                            <svg width="14" height="14" xmlns="http://www.w3.org/2000/svg" viewbox="0 0 20 20" fill="currentColor" aria-hidden="true" data-slot="icon">
  <path d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z"></path>
</svg>                        </button>
                                    </div>
                    </div>

        <div style="display:none" aria-hidden="true" data-pajak-dropzone-inputs></div>
        <div style="display:none" aria-hidden="true" data-pajak-dropzone-deletes></div>
    </div>

    </div>
</body></html>
