<html><body>
<div class="pajak-slider pajak-slider--range">
    
            <div class="pajak-slider__track-wrap" data-pajak-slider data-range data-min="0" data-max="100" data-step="1" data-value-min="20" data-value-max="80" role="group" aria-label="price">
            <div class="pajak-slider__track">
                <div class="pajak-slider__fill" style="left: 20%; width: 60%;"></div>
            </div>

            <div class="pajak-slider__thumb" data-which="min" tabindex="0" role="slider" aria-label="price minimum" aria-valuemin="0" aria-valuemax="100" aria-valuenow="20" style="left: 20%;">
                <span class="pajak-slider__bubble">20</span>
            </div>

            <div class="pajak-slider__thumb" data-which="max" tabindex="0" role="slider" aria-label="price maximum" aria-valuemin="0" aria-valuemax="100" aria-valuenow="80" style="left: 80%;">
                <span class="pajak-slider__bubble">80</span>
            </div>

            <input type="hidden" name="price[min]" class="pajak-slider__input-min" value="20">
            <input type="hidden" name="price[max]" class="pajak-slider__input-max" value="80">
        </div>
    
    </div>
</body></html>
