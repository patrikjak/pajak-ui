<html><body>
<div class="pajak-field">
    
    <div class="pajak-image-grid" data-pajak-image-grid data-name="gallery">
        <div class="pajak-image-grid__grid" data-pajak-grid-items>
                            <div class="pajak-image-grid__tile pajak-image-grid__tile--existing" data-existing data-file-id="1">
                    <img class="pajak-image-grid__thumb" src="/uploads/photo1.jpg" alt="photo1.jpg">
                    <div class="pajak-image-grid__overlay"></div>
                    <input type="hidden" name="gallery_existing[]" value="1" data-existing-input>
                                            <button type="button" class="pajak-image-grid__delete" aria-label="Remove image">
                            <svg width="12" height="12" xmlns="http://www.w3.org/2000/svg" viewbox="0 0 20 20" fill="currentColor" aria-hidden="true" data-slot="icon">
  <path d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z"></path>
</svg>                        </button>
                                    </div>
                            <div class="pajak-image-grid__tile pajak-image-grid__tile--existing" data-existing data-file-id="2">
                    <img class="pajak-image-grid__thumb" src="/uploads/photo2.jpg" alt="photo2.jpg">
                    <div class="pajak-image-grid__overlay"></div>
                    <input type="hidden" name="gallery_existing[]" value="2" data-existing-input>
                                            <button type="button" class="pajak-image-grid__delete" aria-label="Remove image">
                            <svg width="12" height="12" xmlns="http://www.w3.org/2000/svg" viewbox="0 0 20 20" fill="currentColor" aria-hidden="true" data-slot="icon">
  <path d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z"></path>
</svg>                        </button>
                                    </div>
            
                            <div class="pajak-image-grid__tile pajak-image-grid__tile--add" role="button" tabindex="0" data-pajak-grid-add aria-label="Add image">
                    <svg width="20" height="20" xmlns="http://www.w3.org/2000/svg" fill="none" viewbox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true" data-slot="icon">
  <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"></path>
</svg>                    <span>Add image</span>
                </div>
                    </div>

        <input class="pajak-image-grid__input" type="file" name="gallery[]" id="gallery" accept="image/*" multiple tabindex="-1" aria-hidden="true" data-pajak-grid-input>

        <div style="display:none" aria-hidden="true" data-pajak-grid-deletes></div>
    </div>

    </div>
</body></html>
