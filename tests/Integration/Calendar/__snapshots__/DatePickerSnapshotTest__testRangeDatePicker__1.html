<html><body>
<div class="pajak-field">
    
    <div class="pajak-datepicker-wrap pajak-datepicker-wrap--range" data-pajak-datepicker data-range data-placeholder="Select range" data-prev-label="Previous month" data-next-label="Next month" data-today-label="Today" data-apply-label="Apply" data-time-label="Time" data-start-time-label="Start time" data-end-time-label="End time">
        
                    <input type="hidden" name="period_start" class="pajak-datepicker__input-start" value="">
            <input type="hidden" name="period_end" class="pajak-datepicker__input-end" value="">
        
        
        <button type="button" id="period" class="pajak-datepicker__trigger" aria-expanded="false" aria-haspopup="dialog">
            <svg class="pajak-datepicker__ico" width="15" height="15" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span class="pajak-datepicker__display is-placeholder">Select range</span>
            <svg class="pajak-datepicker__chev" width="14" height="14" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        </button>

        
        <div class="pajak-datepicker__panel" role="dialog" aria-modal="true" hidden>

            
            
            <div class="pajak-datepicker__cal">
                
                <div class="pajak-datepicker__header">
                    <button type="button" class="pajak-datepicker__nav pajak-datepicker__nav--prev">
                        <svg width="14" height="14" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <div class="pajak-datepicker__title"></div>
                    <button type="button" class="pajak-datepicker__nav pajak-datepicker__nav--next">
                        <svg width="14" height="14" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                </div>

                
                <div class="pajak-datepicker__weekdays"></div>

                
                <div class="pajak-datepicker__grid"></div>

                
                <div class="pajak-datepicker__footer">
                    <span class="pajak-datepicker__meta"></span>
                                                                <button type="button" class="pajak-datepicker__action pajak-datepicker__action--apply">
                            Apply
                        </button>
                                    </div>
            </div>
        </div>
    </div>

    </div>
</body></html>
